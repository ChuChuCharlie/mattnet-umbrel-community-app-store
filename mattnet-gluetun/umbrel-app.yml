description: >-
  
  This is the Umbrel store version of Gluetun by qdm12. It is 100% their code wrapped in an Umbrel app.

  Sometimes you want to use a VPN for specific applications, but not for your entire network. Gluetun is a lightweight swiss-army-knife-like VPN client to multiple VPN service providers. It supports OpenVPN and WireGuard protocols and has built-in adblock and DNS over TLS features.

  Example use case:
  qBittorrent is often used with a VPN to protect the user's privacy. Normally, you run Gluetun in it's own container with qBittorrent, in the same or another container, and route qBittorrent's traffic through Gluetun. However, Umbrel has it's own Docker implementation that prevents \
  connections between itself and self-installed containers.

  This is a bit of a kludge and needs manual setup after installing, but does mean you can route traffic from an Umbrel app through Gluetun.

  Refer to instructions here after install: https://github.com/ChuChuCharlie/mattnet-umbrel-community-app-store/blob/main/mattnet-gluetun/README.md


